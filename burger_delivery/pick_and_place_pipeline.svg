<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 560" style="background-color: #1e222a; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#56b6c2" />
    </marker>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#abb2bf" />
    </marker>
  </defs>

  <!-- TITULO GENERAL -->
  <text x="475" y="35" fill="#ffffff" font-size="22" font-weight="bold" text-anchor="middle">Pipeline de Pick &amp; Place con MoveIt 2 (Proyecto Burger Delivery)</text>
  <line x1="30" y1="50" x2="920" y2="50" stroke="#4b5263" stroke-width="2"/>

  <!-- PANEL IZQUIERDO: REPRESENTACIÓN FÍSICA -->
  <rect x="30" y="65" width="450" height="470" rx="10" fill="#282c34" stroke="#3e4451" stroke-width="2"/>
  <text x="255" y="95" fill="#61afef" font-size="18" font-weight="bold" text-anchor="middle">1. Entorno Físico y Trayectoria</text>

  <!-- Ambiente Físico -->
  <line x1="40" y1="495" x2="470" y2="495" stroke="#7f848e" stroke-width="4" stroke-dasharray="10,5"/>
  <text x="50" y="520" fill="#abb2bf" font-size="14">Suelo (World / Map)</text>

  <!-- TARTLEBOT (ROBOT MOVIL RECEPTOR - REDUCIDO) -->
  <circle cx="70" cy="490" r="8" fill="#1e222a" stroke="#7f848e" stroke-width="3"/> 
  <circle cx="110" cy="490" r="8" fill="#1e222a" stroke="#7f848e" stroke-width="3"/>
  <rect x="60" y="465" width="60" height="20" rx="3" fill="#3e4451" stroke="#abb2bf" stroke-width="2"/> 
  <rect x="65" y="455" width="50" height="10" rx="2" fill="#2c313a" stroke="#abb2bf" stroke-width="1"/> 
  <rect x="70" y="445" width="40" height="10" rx="2" fill="#2c313a" stroke="#abb2bf" stroke-width="1"/>
  <!-- AprilTag sobre el TurtleBot pidiendo localizacion -->
  <rect x="80" y="438" width="20" height="7" fill="#ffffff" stroke="#d32f2f" stroke-width="1"/>
  
  <text x="90" y="520" fill="#abb2bf" font-size="11" text-anchor="middle">TurtleBot</text>
  <text x="90" y="535" fill="#98c379" font-size="11" font-weight="bold" text-anchor="middle">Robot Móvil</text>

  <!-- MESA FIJA Y KINOVA -->
  <rect x="230" y="440" width="230" height="55" fill="#5c6370"/>
  <rect x="370" y="430" width="80" height="10" fill="#4b5263"/> <!-- Pad pick -->
  <text x="345" y="475" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Mesa Fija</text>

  <!-- Cámara Kinova y FOV a la zona Destino -->
  <polygon points="325,235 40,438 140,438" fill="rgba(244, 81, 30, 0.15)" stroke="#e65100" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Base del Brazo Kinova -->
  <path d="M 265 440 L 295 440 L 285 410 L 275 410 Z" fill="#e5c07b"/>
  <!-- Link 1 -->
  <circle cx="280" cy="410" r="10" fill="#d19a66"/>
  <line x1="280" y1="410" x2="280" y2="300" stroke="#e5c07b" stroke-width="14" stroke-linecap="round"/>
  <!-- Link 2 -->
  <circle cx="280" cy="300" r="10" fill="#d19a66"/>
  <line x1="280" y1="300" x2="330" y2="245" stroke="#e5c07b" stroke-width="12" stroke-linecap="round"/>
  <!-- Link 3 / Gripper Base -->
  <circle cx="330" cy="245" r="10" fill="#d19a66"/>
  <path d="M 330 245 L 360 255 L 360 235 Z" fill="#98c379"/>

  <rect x="315" y="220" width="18" height="18" rx="3" fill="#f4511e" stroke="#d84315" stroke-width="2"/>
  <circle cx="320" cy="229" r="4" fill="#1e222a"/>
  <text x="305" y="220" fill="#f4511e" font-size="12" font-weight="bold" text-anchor="end">Cámara</text>

  <!-- Info Text robot -->
  <text x="260" y="225" fill="#e5c07b" font-size="14" font-weight="bold" text-anchor="end">Brazo Kinova Fijo</text>

  <!-- Paquete Original (Rojo) -->
  <rect x="385" y="390" width="40" height="40" rx="3" fill="#e06c75"/>
  <text x="405" y="415" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">Pkg</text>

  <!-- Destino / Drop Location (Encima del Turtlebot) -->
  <rect x="75" y="415" width="30" height="30" rx="3" fill="#98c379" fill-opacity="0.3" stroke="#98c379" stroke-dasharray="4" stroke-width="2"/>
  <text x="90" y="435" fill="#98c379" font-size="10" font-weight="bold" text-anchor="middle">Dest.</text>

  <!-- Trayectoria MoveIt (Lineas Punteadas) -->
  <line x1="405" y1="310" x2="405" y2="380" stroke="#56b6c2" stroke-width="3" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <circle cx="405" cy="310" r="12" fill="#282c34" stroke="#56b6c2" stroke-width="2"/>
  <text x="405" y="315" fill="#56b6c2" font-size="12" font-weight="bold" text-anchor="middle">1</text>
  
  <circle cx="445" cy="410" r="12" fill="#282c34" stroke="#e06c75" stroke-width="2"/>
  <text x="445" y="415" fill="#e06c75" font-size="12" font-weight="bold" text-anchor="middle">2</text>
  
  <line x1="405" y1="390" x2="405" y2="280" stroke="#56b6c2" stroke-width="3" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <circle cx="405" cy="265" r="12" fill="#282c34" stroke="#56b6c2" stroke-width="2"/>
  <text x="405" y="270" fill="#56b6c2" font-size="12" font-weight="bold" text-anchor="middle">3</text>

  <path d="M 405 250 Q 255 80, 90 200" fill="none" stroke="#61afef" stroke-width="4" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <circle cx="260" cy="140" r="12" fill="#282c34" stroke="#61afef" stroke-width="2"/>
  <text x="260" y="145" fill="#61afef" font-size="12" font-weight="bold" text-anchor="middle">4</text>
  <text x="260" y="125" fill="#61afef" font-size="12" text-anchor="middle">Planificación anti-colisión</text>

  <line x1="90" y1="225" x2="90" y2="400" stroke="#56b6c2" stroke-width="3" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <circle cx="90" cy="215" r="12" fill="#282c34" stroke="#56b6c2" stroke-width="2"/>
  <text x="90" y="220" fill="#56b6c2" font-size="12" font-weight="bold" text-anchor="middle">5</text>

  <circle cx="50" cy="425" r="12" fill="#282c34" stroke="#98c379" stroke-width="2"/>
  <text x="50" y="430" fill="#98c379" font-size="12" font-weight="bold" text-anchor="middle">6</text>

  <line x1="90" y1="400" x2="160" y2="300" stroke="#56b6c2" stroke-width="3" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <circle cx="160" cy="300" r="12" fill="#282c34" stroke="#56b6c2" stroke-width="2"/>
  <text x="160" y="305" fill="#56b6c2" font-size="12" font-weight="bold" text-anchor="middle">7</text>

  <!-- PANEL DERECHO: LÓGICA DE PROGRAMACIÓN (MTC) -->
  <rect x="500" y="65" width="420" height="470" rx="10" fill="#282c34" stroke="#3e4451" stroke-width="2"/>
  <text x="710" y="95" fill="#c678dd" font-size="18" font-weight="bold" text-anchor="middle">2. Código / Stages (MTC Framework)</text>

  <rect x="520" y="115" width="380" height="400" rx="5" fill="#21252b" stroke="#4b5263" stroke-width="1"/>
  <text x="530" y="135" fill="#7f848e" font-size="12">Jerarquía del Pipeline (Se planifica de arriba a abajo)</text>

  <rect x="540" y="150" width="340" height="32" rx="4" fill="#3e4451"/>
  <text x="710" y="171" fill="#ffffff" font-size="14" text-anchor="middle">Estado Inicial (Planning Scene / TF)</text>
  <line x1="710" y1="182" x2="710" y2="197" stroke="#abb2bf" stroke-width="2" marker-end="url(#arrowDown)"/>

  <rect x="540" y="200" width="340" height="32" rx="4" fill="#1e222a" stroke="#56b6c2" stroke-width="2"/>
  <circle cx="560" cy="216" r="10" fill="#56b6c2"/>
  <text x="560" y="220" fill="#282c34" font-size="12" font-weight="bold" text-anchor="middle">1</text>
  <text x="580" y="221" fill="#56b6c2" font-size="14">Stage: MoveTo (Aproximación)</text>
  <line x1="710" y1="232" x2="710" y2="247" stroke="#abb2bf" stroke-width="2" marker-end="url(#arrowDown)"/>

  <rect x="540" y="250" width="340" height="32" rx="4" fill="#1e222a" stroke="#e06c75" stroke-width="2"/>
  <circle cx="560" cy="266" r="10" fill="#e06c75"/>
  <text x="560" y="270" fill="#282c34" font-size="12" font-weight="bold" text-anchor="middle">2</text>
  <text x="580" y="271" fill="#e06c75" font-size="14">Comando: Attach + Cerrar Gripper</text>
  <line x1="710" y1="282" x2="710" y2="297" stroke="#abb2bf" stroke-width="2" marker-end="url(#arrowDown)"/>

  <rect x="540" y="300" width="340" height="32" rx="4" fill="#1e222a" stroke="#56b6c2" stroke-width="2"/>
  <circle cx="560" cy="316" r="10" fill="#56b6c2"/>
  <text x="560" y="320" fill="#282c34" font-size="12" font-weight="bold" text-anchor="middle">3</text>
  <text x="580" y="321" fill="#56b6c2" font-size="14">Stage: MoveRelative (Eje Z+, Levantar)</text>
  <line x1="710" y1="332" x2="710" y2="347" stroke="#abb2bf" stroke-width="2" marker-end="url(#arrowDown)"/>

  <rect x="540" y="350" width="340" height="32" rx="4" fill="#61afef"/>
  <circle cx="560" cy="366" r="10" fill="#282c34"/>
  <text x="560" y="370" fill="#61afef" font-size="12" font-weight="bold" text-anchor="middle">4</text>
  <text x="580" y="371" fill="#282c34" font-size="14" font-weight="bold">Stage: Connect (Trayectoria a Destino visualizado)</text>
  <line x1="710" y1="382" x2="710" y2="397" stroke="#abb2bf" stroke-width="2" marker-end="url(#arrowDown)"/>

  <rect x="540" y="400" width="340" height="32" rx="4" fill="#1e222a" stroke="#56b6c2" stroke-width="2"/>
  <circle cx="560" cy="416" r="10" fill="#56b6c2"/>
  <text x="560" y="420" fill="#282c34" font-size="12" font-weight="bold" text-anchor="middle">5</text>
  <text x="580" y="421" fill="#56b6c2" font-size="14">Stage: MoveTo (Bajar al destino Z-)</text>
  <line x1="710" y1="432" x2="710" y2="447" stroke="#abb2bf" stroke-width="2" marker-end="url(#arrowDown)"/>

  <rect x="540" y="450" width="340" height="50" rx="4" fill="#1e222a" stroke="#98c379" stroke-width="2"/>
  <circle cx="560" cy="466" r="10" fill="#98c379"/>
  <text x="560" y="470" fill="#282c34" font-size="12" font-weight="bold" text-anchor="middle">6</text>
  <circle cx="560" cy="486" r="10" fill="#56b6c2"/>
  <text x="560" y="490" fill="#282c34" font-size="8" font-weight="bold" text-anchor="middle">7</text>
  <text x="580" y="470" fill="#98c379" font-size="14">Comando: Detach + Abrir Gripper</text>
  <text x="580" y="490" fill="#56b6c2" font-size="14">Stage: MoveRelative (Retirada)</text>

</svg>
