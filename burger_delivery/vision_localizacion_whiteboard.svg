<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" style="background-color: #f8f9fa; font-family: 'Segoe UI', Roboto, Helvetica, 'Arial', sans-serif;">
  <defs>
    <!-- Arrow Markers -->
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2196f3" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f44336" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>

    <!-- AprilTag Component -->
    <g id="apriltag">
      <rect x="0" y="0" width="50" height="50" fill="#212121" rx="4"/>
      <rect x="5" y="5" width="40" height="40" fill="#ffffff"/>
      <!-- Internal Grid Mockup -->
      <rect x="10" y="10" width="12" height="12" fill="#212121"/>
      <rect x="28" y="10" width="12" height="12" fill="#212121"/>
      <rect x="10" y="28" width="8" height="12" fill="#212121"/>
      <rect x="22" y="28" width="18" height="12" fill="#212121"/>
      <text x="25" y="-8" font-size="14" fill="#d32f2f" font-weight="bold" text-anchor="middle">AprilTag</text>
    </g>

    <!-- TurtleBot Front-Top View -->
    <g id="turtlebot">
      <!-- Body chassis -->
      <circle cx="45" cy="45" r="45" fill="#cfd8dc" stroke="#90a4ae" stroke-width="4"/>
      <!-- Wheels -->
      <rect x="-5" y="15" width="10" height="60" rx="3" fill="#37474f"/>
      <rect x="85" y="15" width="10" height="60" rx="3" fill="#37474f"/>
      <!-- Front marking -->
      <path d="M 35 5 L 55 5 L 45 15 Z" fill="#2196f3"/>
    </g>
  </defs>

  <!-- Title -->
  <text x="800" y="60" fill="#263238" font-size="36" font-weight="bold" text-anchor="middle">Esquema de Localización por Visión - Burger Delivery</text>
  <text x="800" y="95" fill="#546e7a" font-size="20" font-weight="500" text-anchor="middle">Uso de cámara (Kinova) y AprilTags para detección de robots exploradores</text>

  <!-- ==================== AREA DE PREPARACION (LEFT) ==================== -->
  <rect x="50" y="160" width="500" height="500" rx="20" fill="#e8f5e9" stroke="#81c784" stroke-width="5" stroke-dasharray="15,10"/>
  <text x="300" y="210" fill="#2e7d32" font-size="28" font-weight="bold" text-anchor="middle">Área de Preparación</text>
  <text x="300" y="240" fill="#4caf50" font-size="16" font-weight="bold" text-anchor="middle">(Donde se sirven las hamburguesas)</text>

  <!-- Kinova Base -->
  <circle cx="200" cy="450" r="50" fill="#455a64" stroke="#263238" stroke-width="5"/>
  <circle cx="200" cy="450" r="30" fill="#607d8b"/>
  <text x="200" y="530" fill="#37474f" font-size="18" font-weight="bold" text-anchor="middle">Brazo Kinova</text>

  <!-- Kinova Arm Links -->
  <!-- Link 1 -->
  <line x1="200" y1="450" x2="350" y2="350" stroke="#b0bec5" stroke-width="25" stroke-linecap="round"/>
  <line x1="200" y1="450" x2="350" y2="350" stroke="#78909c" stroke-width="5" stroke-linecap="round" stroke-dasharray="5,15"/>
  <circle cx="350" cy="350" r="15" fill="#ffb300"/>
  
  <!-- Link 2 -->
  <line x1="350" y1="350" x2="480" y2="440" stroke="#b0bec5" stroke-width="20" stroke-linecap="round"/>
  <circle cx="480" cy="440" r="12" fill="#ffb300"/>

  <!-- End Effector / Camera -->
  <rect x="460" y="430" width="50" height="40" rx="5" fill="#f4511e" stroke="#d84315" stroke-width="4"/>
  <circle cx="510" cy="450" r="10" fill="#212121"/> <!-- Camera Lens -->
  <text x="440" y="415" fill="#d84315" font-size="16" font-weight="bold" text-anchor="end">Cámara (Ojo del sistema)</text>

  <!-- FOV CONE -->
  <polygon points="520,450 1150,220 1150,680" fill="rgba(255, 152, 0, 0.15)" stroke="#ffb300" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="590" y="390" fill="#f57c00" font-size="18" font-weight="bold" transform="rotate(10, 590, 390)">Campo de Visión (FOV)</text>


  <!-- ==================== MESA DE PRUEBAS (CENTER-RIGHT) ==================== -->
  <rect x="650" y="160" width="550" height="500" rx="20" fill="#e3f2fd" stroke="#64b5f6" stroke-width="5" stroke-dasharray="15,10"/>
  <text x="925" y="210" fill="#1565c0" font-size="28" font-weight="bold" text-anchor="middle">Mesa de Pruebas</text>
  <text x="925" y="240" fill="#2196f3" font-size="16" font-weight="bold" text-anchor="middle">(Donde operan los TurtleBots)</text>

  <!-- Origin Marker (AprilTag Reference) -->
  <use href="#apriltag" x="640" y="590"/>
  
  <!-- Reference Raycast from Camera to Origin Tag -->
  <path d="M 520 450 L 665 615" stroke="#2196f3" stroke-width="2" stroke-dasharray="4,4"/>
  
  <path d="M 665 615 L 750 615" stroke="#f44336" stroke-width="4" marker-end="url(#arrow-red)"/>
  <text x="760" y="620" fill="#f44336" font-size="16" font-weight="bold">X</text>
  <path d="M 665 615 L 665 520" stroke="#4caf50" stroke-width="4" marker-end="url(#arrow-green)"/>
  <text x="660" y="510" fill="#4caf50" font-size="16" font-weight="bold">Y</text>
  <text x="700" y="655" fill="#546e7a" font-size="16" font-weight="bold">Origen Global (Tag Referencia)</text>
  
  <text x="700" y="675" fill="#78909c" font-size="14">(La pose de los robots es un Offset relativo a este TAG estático)</text>

  <!-- TurtleBots -->
  <!-- Robot 1 -->
  <g transform="translate(750, 350)">
    <use href="#turtlebot" x="0" y="0"/>
    <use href="#apriltag" x="20" y="20"/>
  </g>
  <path d="M 520 450 L 780 395" stroke="#f4511e" stroke-width="2" stroke-dasharray="4,4"/> <!-- Raycast from camera to tag -->
  <text x="780" y="340" fill="#37474f" font-size="16" font-weight="bold" text-anchor="middle">Robot 1</text>

  <!-- Robot 2 -->
  <g transform="translate(950, 480) rotate(-15 45 45)">
    <use href="#turtlebot" x="0" y="0"/>
    <use href="#apriltag" x="20" y="20"/>
  </g>
  <path d="M 520 450 L 980 520" stroke="#f4511e" stroke-width="2" stroke-dasharray="4,4"/> <!-- Raycast from camera to tag -->
  <text x="1000" y="470" fill="#37474f" font-size="16" font-weight="bold" text-anchor="middle">Robot 2</text>


  <!-- ==================== ARQUITECTURA ROS 2 (RIGHT) ==================== -->
  <rect x="1250" y="160" width="300" height="500" rx="15" fill="#fffde7" stroke="#fff176" stroke-width="5"/>
  <text x="1400" y="210" fill="#f57f17" font-size="24" font-weight="bold" text-anchor="middle">Servicio ROS 2</text>
  <text x="1400" y="235" fill="#fbc02d" font-size="14" font-weight="bold" text-anchor="middle">(Cálculo de Localización)</text>

  <!-- Server Node -->
  <circle cx="1400" cy="320" r="50" fill="#ffffff" stroke="#f4511e" stroke-width="4"/>
  <text x="1400" y="315" fill="#d84315" font-size="18" font-weight="bold" text-anchor="middle">Sub-Sistema</text>
  <text x="1400" y="335" fill="#d84315" font-size="18" font-weight="bold" text-anchor="middle">Kinova Visión</text>

  <rect x="1280" y="390" width="240" height="90" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  <text x="1400" y="420" fill="#546e7a" font-size="14" text-anchor="middle">Procesa imagen, detecta los</text>
  <text x="1400" y="440" fill="#546e7a" font-size="14" text-anchor="middle">Tags y calcula [x, y, theta] de</text>
  <text x="1400" y="460" fill="#546e7a" font-size="14" text-anchor="middle">los robots relativos al Tag Origen</text>

  <!-- Client Node -->
  <circle cx="1400" cy="580" r="50" fill="#ffffff" stroke="#2196f3" stroke-width="4"/>
  <text x="1400" y="575" fill="#1565c0" font-size="18" font-weight="bold" text-anchor="middle">Nodo</text>
  <text x="1400" y="595" fill="#1565c0" font-size="18" font-weight="bold" text-anchor="middle">Flota (Cliente)</text>

  <!-- Service Arrows -->
  <path d="M 1360 520 L 1360 380" stroke="#ff9800" stroke-width="4" marker-end="url(#arrow-orange)" stroke-dasharray="6,4"/>
  <text x="1350" y="470" fill="#e65100" font-size="14" font-weight="bold" text-anchor="end" transform="rotate(-90 1350 470)">Request: Dónde están?</text>

  <path d="M 1440 380 L 1440 520" stroke="#4caf50" stroke-width="4" marker-end="url(#arrow-green)" stroke-dasharray="6,4"/>
  <text x="1450" y="420" fill="#2e7d32" font-size="14" font-weight="bold" transform="rotate(90 1450 420)">Response: Poses relativas 3D</text>

  <!-- ==================== LOCAL NETWORK ==================== -->
  <rect x="50" y="700" width="300" height="100" rx="15" fill="#eceff1" stroke="#b0bec5" stroke-width="4"/>
  <text x="200" y="740" fill="#455a64" font-size="22" font-weight="bold" text-anchor="middle">Servidor Local &amp; Router</text>
  <text x="200" y="765" fill="#607d8b" font-size="16" text-anchor="middle">(Drivers ROS 2 Jazzy, Red WiFi)</text>

  <!-- Link Kinova to Network -->
  <path d="M 200 500 L 200 690" stroke="#b0bec5" stroke-width="4" stroke-dasharray="8,8"/>

</svg>
